name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      # ./gradlew build = compile + 전체 테스트(단위 + Testcontainers 통합 ConcurrencyTest) + jar
      # GitHub Actions 러너는 Docker 가 기본 제공되어 Testcontainers 가 정상 동작한다.
      - name: Build & test
        run: ./gradlew --no-daemon build

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/reports/tests/test
          if-no-files-found: ignore
          retention-days: 7
