services:
  postgres:
    image: postgres:16-alpine
    container_name: liveklass-postgres
    environment:
      POSTGRES_DB: liveklass
      POSTGRES_USER: liveklass
      POSTGRES_PASSWORD: liveklass
      TZ: UTC
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liveklass -d liveklass"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: liveklass-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/liveklass
      SPRING_DATASOURCE_USERNAME: liveklass
      SPRING_DATASOURCE_PASSWORD: liveklass
      SPRING_PROFILES_ACTIVE: docker
      TZ: UTC
    ports:
      - "8080:8080"
    profiles:
      - app

volumes:
  postgres-data:
