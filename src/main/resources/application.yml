spring:
  application:
    name: liveklass-be-assignment
  profiles:
    active: local
  datasource:
    url: jdbc:postgresql://localhost:5432/liveklass
    username: liveklass
    password: liveklass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

enrollment:
  # CONFIRMED 수강 신청의 취소 가능 기간 (결제 후). 비우면 제한 없음.
  refund-window: 7d

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized

springdoc:
  # Pageable 같은 객체 파라미터를 page/size/sort 개별 query param 으로 분리 렌더링한다.
  # 안 그러면 Swagger UI 가 sort 를 JSON 배열로 직렬화해 ?sort=["id,desc"] 처럼 깨진 형식으로 보냄.
  default-flat-param-object: true
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    root: INFO
    com.liveklass: DEBUG
    org.hibernate.SQL: DEBUG
